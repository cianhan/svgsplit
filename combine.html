<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Split-Combiner // DevTool</title>
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-panel: #161b22;
            --bg-input: #21262d;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-green: #2ea44f;
            --accent-green-hover: #2c974b;
            --accent-blue: #58a6ff;
            --font-mono: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 500;
            color: #f0f6fc;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
        }

        .workspace {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .panel-left {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-right {
            flex: 1.5;
            min-width: 400px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel-right h3 {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 20px;
            align-self: flex-start;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upload-box {
            background: var(--bg-panel);
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            padding: 20px;
            transition: border-color 0.2s;
        }

        .upload-box:hover {
            border-color: var(--text-muted);
        }

        .upload-box label {
            display: block;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        /* Custom style for file inputs to match tool look */
        .upload-box input[type="file"] {
            width: 100%;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .thumbnail-preview {
            width: 100%;
            height: 140px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            display: none;
        }

        .controls {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }

        .controls label {
            font-family: var(--font-mono);
            font-size: 13px;
            display: block;
            margin-bottom: 12px;
        }

        #sliderValue {
            color: var(--accent-blue);
            font-weight: bold;
        }

        /* Modern dark-themed range slider styling */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: var(--bg-input);
            height: 6px;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
        }

        /* Action Buttons styling */
        .btn {
            width: 100%;
            padding: 10px 16px;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(27, 31, 36, 0.15);
            border-radius: 6px;
            cursor: pointer;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        .combine-btn {
            background-color: var(--accent-green);
            color: #ffffff;
        }

        .combine-btn:hover {
            background-color: var(--accent-green-hover);
        }

        .download-btn {
            background-color: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            padding: 10px 20px;
            width: auto;
            text-align: center;
        }

        .download-btn:hover {
            background-color: var(--bg-input);
            border-color: var(--text-muted);
        }

        /* Output Canvas Area */
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-main);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-top: 10px;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 13px;
            text-align: center;
            margin: auto 0;
            padding: 100px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>image-split-combiner // v1.0</h1>
        <p>A precision browser tool to splice and stitch layout slices.</p>
    </header>
    
    <div class="workspace">
        
        <div class="panel-left">
            
            <div class="upload-box">
                <label for="leftInput">SOURCE_LEFT</label>
                <input type="file" id="leftInput" accept="image/*">
                <img id="leftThumb" class="thumbnail-preview" alt="Left Preview">
            </div>

            <div class="upload-box">
                <label for="rightInput">SOURCE_RIGHT</label>
                <input type="file" id="rightInput" accept="image/*">
                <img id="rightThumb" class="thumbnail-preview" alt="Right Preview">
            </div>

            <div class="controls">
                <label for="splitSlider">SPLIT_POSITION: <span id="sliderValue">50</span>%</label>
                <input type="range" id="splitSlider" min="0" max="100" value="50">
                
                <button id="combineBtn" class="btn combine-btn">EXECUTE_COMBINE</button>
            </div>
            
        </div>

        <div class="panel-right">
            <h3>output_render_canvas</h3>
            <p id="placeholder" class="placeholder-text">[ awaiting source image vectors... ]</p>
            <canvas id="resultCanvas" style="display: none;"></canvas>
            
            <a id="downloadBtn" style="display: none;" class="btn download-btn">
                EXPORT_PNG
            </a>
        </div>

    </div>

    <script>
        const leftInput = document.getElementById('leftInput');
        const rightInput = document.getElementById('rightInput');
        const leftThumb = document.getElementById('leftThumb');
        const rightThumb = document.getElementById('rightThumb');
        const splitSlider = document.getElementById('splitSlider');
        const sliderValue = document.getElementById('sliderValue');
        const combineBtn = document.getElementById('combineBtn');
        const canvas = document.getElementById('resultCanvas');
        const placeholder = document.getElementById('placeholder');
        const downloadBtn = document.getElementById('downloadBtn');

        let imgLeft = null;
        let imgRight = null;

        leftInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                imgLeft = new Image();
                imgLeft.src = URL.createObjectURL(file);
                imgLeft.onload = () => {
                    leftThumb.src = imgLeft.src;
                    leftThumb.style.display = 'block';
                };
            }
        });

        rightInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                imgRight = new Image();
                imgRight.src = URL.createObjectURL(file);
                imgRight.onload = () => {
                    rightThumb.src = imgRight.src;
                    rightThumb.style.display = 'block';
                };
            }
        });

        splitSlider.addEventListener('input', (e) => {
            sliderValue.textContent = e.target.value;
        });

        combineBtn.addEventListener('click', () => {
            if (!imgLeft || !imgRight) {
                alert("Error: Both source files must be assigned before executing.");
                return;
            }
            mergeImages();
        });

        function mergeImages() {
            const ctx = canvas.getContext('2d');
            const targetWidth = Math.max(imgLeft.width, imgRight.width);
            const targetHeight = Math.max(imgLeft.height, imgRight.height);
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            const splitPercent = splitSlider.value / 100;
            const canvasSplitX = targetWidth * splitPercent;
            const leftSourceSplitX = imgLeft.width * splitPercent;
            const rightSourceSplitX = imgRight.width * splitPercent;

            ctx.drawImage(imgLeft, 0, 0, leftSourceSplitX, imgLeft.height, 0, 0, canvasSplitX, targetHeight);
            ctx.drawImage(imgRight, rightSourceSplitX, 0, imgRight.width - rightSourceSplitX, imgRight.height, canvasSplitX, 0, targetWidth - canvasSplitX, targetHeight);

            placeholder.style.display = 'none';
            canvas.style.display = 'inline-block';
            
            downloadBtn.href = canvas.toDataURL('image/png');
            downloadBtn.download = 'split-combined-image.png';
            downloadBtn.style.display = 'inline-block';
        }
    </script>
</body>
</html>
